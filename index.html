<!DOCTYPE html>
<html lang="en">
<!-- ============================================================
     RESTRICTIONS CONFIG — EDIT ONLY THIS SECTION
     message_limit : max messages per session     (default 1000)
     max_input     : max characters per message   (default 500)
     password      : leave "" to disable password
     banned_words  : words that get auto-blocked
     ============================================================ -->
<script>
  const RESTRICTIONS = {
    message_limit : 1000,
    max_input     : 5000,
    password      : "",
    banned_words  : ["bomb","weapon","drugs","ransomware","trojan","rootkit"]
  };
</script>
<!-- ============================================================ -->
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevMind – AI Assistant</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap');
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#07070f; color:#e2e4f0; font-family:'Inter',sans-serif; height:100vh; display:flex; flex-direction:column; }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:#0d0d1a; }
    ::-webkit-scrollbar-thumb { background:#2a2a3e; border-radius:3px; }
    @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.1)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes gradShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    #header { display:flex; align-items:center; justify-content:space-between; padding:14px 22px; border-bottom:1px solid #1a1a2e; flex-shrink:0; }
    #logo { display:flex; align-items:center; gap:11px; }
    #logo-icon { width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899); background-size:200% 200%; animation:gradShift 3s ease infinite; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 0 20px #6366f144; }
    #logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:#fff; }
    #logo-sub { font-size:10px; color:#7c7caa; letter-spacing:.07em; }
    #counter { font-size:12px; color:#7c7caa; background:#0f0f1c; border:1px solid #1e1e30; padding:6px 14px; border-radius:20px; }
    #counter span { color:#a5b4fc; font-weight:600; }
    #new-chat-btn { background:transparent; border:1px solid #1e1e30; color:#7c7caa; padding:7px 14px; border-radius:8px; cursor:pointer; font-size:12px; transition:all .2s; }
    #new-chat-btn:hover { background:#1a1a2e; }
    #messages { flex:1; overflow-y:auto; padding:24px 16px; }
    #messages-inner { max-width:780px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
    .msg-row { display:flex; gap:12px; align-items:flex-start; animation:fadeUp .3s ease forwards; }
    .msg-row.user { flex-direction:row-reverse; }
    .avatar { width:34px; height:34px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; }
    .avatar.ai { background:linear-gradient(135deg,#6366f1,#a855f7); box-shadow:0 0 14px #6366f133; }
    .avatar.user { background:#1a1a2e; border:1px solid #2a2a3e; }
    .bubble { max-width:82%; padding:13px 17px; font-size:14px; line-height:1.75; color:#d4d6f0; }
    .bubble.ai { background:#0f0f1c; border:1px solid #1e1e30; border-radius:4px 14px 14px 14px; }
    .bubble.user { background:#13132a; border:1px solid #252540; border-radius:14px 4px 14px 14px; }
    .code-wrap { margin:10px 0; border-radius:10px; overflow:hidden; border:1px solid #2a2a3e; }
    .code-header { display:flex; justify-content:space-between; align-items:center; background:#12121e; padding:6px 14px; border-bottom:1px solid #2a2a3e; }
    .code-lang { color:#7c7caa; font-size:12px; font-family:'JetBrains Mono',monospace; }
    .copy-btn { background:#ffffff0f; border:1px solid #ffffff15; color:#aaa; padding:3px 10px; border-radius:5px; cursor:pointer; font-size:11px; font-family:'JetBrains Mono',monospace; transition:all .2s; }
    .copy-btn:hover { background:#ffffff1a; color:#fff; }
    .copy-btn.copied { background:#22c55e22; border-color:#22c55e55; color:#22c55e; }
    pre { margin:0; padding:16px; background:#0d0d1a; overflow-x:auto; font-size:13px; line-height:1.7; color:#c9d1e0; font-family:'JetBrains Mono','Fira Code',monospace; }
    #typing { display:none; gap:12px; align-items:flex-start; }
    #typing.show { display:flex; }
    .dots { display:flex; gap:5px; padding:14px 18px; align-items:center; background:#0f0f1c; border:1px solid #1e1e30; border-radius:4px 14px 14px 14px; }
    .dot { width:7px; height:7px; border-radius:50%; background:#6366f1; animation:pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    #quick-prompts { max-width:780px; margin:0 auto; width:100%; padding:0 16px 12px; display:flex; flex-wrap:wrap; gap:8px; }
    .qbtn { background:#0f0f1c; border:1px solid #1e1e30; color:#9ca3d4; padding:7px 14px; border-radius:20px; cursor:pointer; font-size:12px; transition:all .2s; }
    .qbtn:hover { background:#1a1a2e; border-color:#6366f155; color:#a5b4fc; }
    #lang-chips { max-width:780px; margin:0 auto; width:100%; padding:0 16px 10px; display:flex; gap:6px; overflow-x:auto; }
    .chip { background:transparent; border:1px solid #1e1e30; color:#7c7caa; padding:4px 12px; border-radius:20px; cursor:pointer; font-size:11px; font-family:'JetBrains Mono',monospace; white-space:nowrap; flex-shrink:0; transition:all .15s; }
    .chip:hover { background:#6366f122; border-color:#6366f166; }
    .chip.active { background:#6366f133; border-color:#6366f1; color:#a5b4fc; }
    #input-wrap { max-width:780px; margin:0 auto; width:100%; padding:0 16px 20px; }
    #input-box { display:flex; gap:10px; align-items:flex-end; background:#0f0f1c; border:1px solid #1e1e30; border-radius:14px; padding:10px 12px; box-shadow:0 0 30px #6366f110; }
    #user-input { flex:1; background:transparent; border:none; resize:none; color:#e2e4f0; font-size:14px; line-height:1.6; font-family:'Inter',sans-serif; max-height:150px; overflow-y:auto; padding-top:4px; }
    #user-input:focus { outline:none; }
    #send-btn { width:38px; height:38px; background:#1a1a2e; border:none; border-radius:9px; display:flex; align-items:center; justify-content:center; cursor:not-allowed; flex-shrink:0; font-size:17px; color:#444; transition:all .2s; }
    #send-btn.ready { background:#6366f1; color:#fff; cursor:pointer; }
    #send-btn.ready:hover { background:#4f46e5; transform:scale(1.04); }
    #hint { text-align:center; margin-top:8px; font-size:11px; color:#3a3a5a; }
  </style>
</head>
<body>

<div id="header">
  <div id="logo">
    <div id="logo-icon">⚡</div>
    <div>
      <div id="logo-text">DevMind</div>
      <div id="logo-sub">AI CODING ASSISTANT</div>
    </div>
  </div>
  <div id="counter">Messages: <span id="msg-count">0</span> / <span id="msg-limit"></span></div>
  <button id="new-chat-btn" onclick="newChat()">+ New Chat</button>
</div>

<div id="messages">
  <div id="messages-inner"></div>
</div>

<div id="quick-prompts">
  <button class="qbtn" onclick="setInput('Write a Python script that ')">🐍 Python</button>
  <button class="qbtn" onclick="setInput('Build a React component that ')">⚛️ React</button>
  <button class="qbtn" onclick="setInput('Write a SQL query that ')">🗄️ SQL</button>
  <button class="qbtn" onclick="setInput('Debug this code:\n\n')">🔧 Debug</button>
  <button class="qbtn" onclick="setInput('Design the architecture for ')">📐 Architecture</button>
  <button class="qbtn" onclick="setInput('Explain how ')">💡 Explain</button>
</div>

<div id="lang-chips">
  <button class="chip" onclick="toggleLang(this,'Python')">Python</button>
  <button class="chip" onclick="toggleLang(this,'JavaScript')">JavaScript</button>
  <button class="chip" onclick="toggleLang(this,'TypeScript')">TypeScript</button>
  <button class="chip" onclick="toggleLang(this,'Rust')">Rust</button>
  <button class="chip" onclick="toggleLang(this,'Go')">Go</button>
  <button class="chip" onclick="toggleLang(this,'Java')">Java</button>
  <button class="chip" onclick="toggleLang(this,'C++')">C++</button>
  <button class="chip" onclick="toggleLang(this,'SQL')">SQL</button>
  <button class="chip" onclick="toggleLang(this,'Bash')">Bash</button>
  <button class="chip" onclick="toggleLang(this,'Swift')">Swift</button>
</div>

<div id="input-wrap">
  <div id="input-box">
    <textarea id="user-input" rows="1"
      placeholder="Ask me to code anything or just chat..."
      oninput="onInput(this)"
      onkeydown="onKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">↑</button>
  </div>
  <div id="hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
  const API_KEY = "AQ.Ab8RN6KcghEKJGzCFsMHYq_zbcK1no-gQoJrnHBCeO3yQeg1FQ"; 
  const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

  const SYSTEM = `You are DevMind, an elite AI coding assistant. You can write code in ANY language: Python, JavaScript, TypeScript, Rust, Go, C++, Java, SQL, Bash, Swift, Kotlin, PHP, Ruby and more. Always wrap code in triple backtick fences with language name. Write clean well-commented production-ready code. Briefly explain the code after. Never help with hacking malware exploits or harmful content.`;

  let history = [];
  let messageCount = 0;
  let selectedLang = "";

  window.onload = () => {
    document.getElementById("msg-limit").textContent = RESTRICTIONS.message_limit;
    boot();
  };

  function boot() {
    addAIMessage("Hello! I'm **DevMind** — your AI coding assistant.\n\nI can write code in any language, debug programs, explain concepts, or just chat. You have **" + RESTRICTIONS.message_limit + " messages** this session. What would you like to build?");
  }

  async function sendMessage() {
    const ta   = document.getElementById("user-input");
    const text = ta.value.trim();
    if (!text) return;

    if (messageCount >= RESTRICTIONS.message_limit) {
      addAIMessage("⛔ **Limit reached.** You have used all " + RESTRICTIONS.message_limit + " messages. Please refresh to start over.");
      return;
    }

    if (text.length > RESTRICTIONS.max_input) {
      addAIMessage("⛔ **Message too long.** Keep it under " + RESTRICTIONS.max_input + " characters. Yours was " + text.length + ".");
      return;
    }

    const hit = RESTRICTIONS.banned_words.find(w => text.toLowerCase().includes(w));
    if (hit) {
      addAIMessage("⛔ **Blocked.** Your message contains a restricted word: `" + hit + "`.");
      return;
    }

    messageCount++;
    updateCounter();

    const userText = selectedLang ? `Write code in ${selectedLang}: ${text}` : text;
    addUserMessage(userText);
    history.push({ role:"user", parts:[{ text: userText }] });

    ta.value = "";
    ta.style.height = "auto";
    updateSendBtn();
    hideQuickPrompts();
    showTyping(true);

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({
          system_instruction: { parts:[{ text: SYSTEM }] },
          contents: history
        })
      });

      const data  = await res.json();
      const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "⚠️ No response.";
      history.push({ role:"model", parts:[{ text: reply }] });
      showTyping(false);
      addAIMessage(reply);

    } catch (err) {
      showTyping(false);
      addAIMessage("⚠️ **Network error.** Check your API key and connection.");
      console.error(err);
    }
  }

  function addUserMessage(text) {
    const inner = document.getElementById("messages-inner");
    const row   = document.createElement("div");
    row.className = "msg-row user";
    row.innerHTML = `<div class="avatar user">👤</div><div class="bubble user">${escapeHtml(text)}</div>`;
    inner.appendChild(row);
    scrollBottom();
  }

  function addAIMessage(text) {
    const inner  = document.getElementById("messages-inner");
    const row    = document.createElement("div");
    row.className = "msg-row";
    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.innerHTML  = renderContent(text);
    row.innerHTML = `<div class="avatar ai">⚡</div>`;
    row.appendChild(bubble);
    inner.appendChild(row);
    bubble.querySelectorAll(".copy-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        navigator.clipboard.writeText(decodeURIComponent(btn.dataset.code));
        btn.textContent = "✓ Copied";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
      });
    });
    scrollBottom();
  }

  function renderContent(text) {
    text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    text = text.replace(/`([^`]+)`/g, "<code style='background:#1a1a2e;padding:2px 6px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:12px'>$1</code>");
    text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_,lang,code) => {
      const safe    = escapeHtml(code.trim());
      const encoded = encodeURIComponent(code.trim());
      return `<div class="code-wrap"><div class="code-header"><span class="code-lang">${lang||"code"}</span><button class="copy-btn" data-code="${encoded}">Copy</button></div><pre><code>${safe}</code></pre></div>`;
    });
    text = text.replace(/\n/g,"<br>");
    return text;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function showTyping(show) {
    let el = document.getElementById("typing");
    if (!el) {
      el = document.createElement("div");
      el.id = "typing";
      el.innerHTML = `<div class="avatar ai">⚡</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      document.getElementById("messages-inner").appendChild(el);
    }
    el.className = show ? "msg-row show" : "msg-row";
    scrollBottom();
  }

  function updateCounter() {
    document.getElementById("msg-count").textContent = messageCount;
    if (RESTRICTIONS.message_limit - messageCount <= 50)
      document.getElementById("msg-count").style.color = "#f87171";
  }

  function toggleLang(btn, lang) {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    selectedLang = selectedLang === lang ? "" : lang;
    if (selectedLang) btn.classList.add("active");
    document.getElementById("user-input").placeholder = selectedLang ? `Ask me to write ${selectedLang} code...` : "Ask me to code anything or just chat...";
  }

  function setInput(text) { const ta=document.getElementById("user-input"); ta.value=text; ta.focus(); onInput(ta); }
  function onInput(ta) { ta.style.height="auto"; ta.style.height=Math.min(ta.scrollHeight,150)+"px"; updateSendBtn(); }
  function onKey(e) { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} }
  function updateSendBtn() { document.getElementById("send-btn").classList.toggle("ready", document.getElementById("user-input").value.trim().length>0); }
  function hideQuickPrompts() { document.getElementById("quick-prompts").style.display="none"; }
  function scrollBottom() { const m=document.getElementById("messages"); setTimeout(()=>m.scrollTop=m.scrollHeight,50); }

  function newChat() {
    history=[]; messageCount=0;
    document.getElementById("messages-inner").innerHTML="";
    document.getElementById("quick-prompts").style.display="flex";
    document.getElementById("msg-count").textContent="0";
    document.getElementById("msg-count").style.color="#a5b4fc";
    document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
    selectedLang="";
    boot();
  }
</script>
</body>
  </html>
